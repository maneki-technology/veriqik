name: CI

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style:
    name: Style
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Zig
        uses: mlugg/setup-zig@v2.2.1

      - name: Check style
        run: zig build style --summary all

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Zig
        uses: mlugg/setup-zig@v2.2.1

      - name: Run tests
        run: zig build test --summary all

  release-safe:
    name: ReleaseSafe build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Zig
        uses: mlugg/setup-zig@v2.2.1

      - name: Build
        run: zig build -Doptimize=ReleaseSafe --summary all
